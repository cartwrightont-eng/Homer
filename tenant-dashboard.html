<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Dashboard — Homerr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="static/css/main.css" />
  <style>
    .dash { display:flex; min-height:100vh; padding-top:72px; }
    .dash__sidebar {
      width:240px; flex-shrink:0; padding:32px 20px;
      border-right:1px solid var(--color-border);
      position:sticky; top:72px; height:calc(100vh - 72px); overflow-y:auto;
    }
    .dash__main { flex:1; padding:40px 48px; max-width:960px; }
    .dash__greeting { font-family:'Instrument Serif',serif; font-size:2rem; margin-bottom:4px; }
    .dash__sub { color:var(--color-muted); font-size:0.9rem; margin-bottom:40px; }
    .nav-item {
      display:flex; align-items:center; gap:10px; padding:10px 14px;
      border-radius:10px; font-size:0.88rem; font-weight:500;
      color:var(--color-muted); cursor:pointer; margin-bottom:4px;
      transition:background 0.15s, color 0.15s; border:none; background:none; width:100%; text-align:left;
    }
    .nav-item:hover { background:var(--color-sage-ghost); color:var(--color-foreground); }
    .nav-item.active { background:var(--color-sage-ghost); color:var(--color-sage-deep); }
    .nav-item svg { flex-shrink:0; }
    .section { display:none; }
    .section.active { display:block; }
    .stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:40px; }
    .stat-card {
      background:rgba(255,255,255,0.6); backdrop-filter:blur(12px);
      border:1px solid var(--color-border); border-radius:16px; padding:24px;
    }
    .stat-card__value { font-size:2rem; font-weight:600; color:var(--color-sage-deep); margin-bottom:4px; }
    .stat-card__label { font-size:0.82rem; color:var(--color-muted); }
    .card {
      background:rgba(255,255,255,0.6); backdrop-filter:blur(12px);
      border:1px solid var(--color-border); border-radius:16px;
      padding:24px; margin-bottom:16px;
    }
    .card__title { font-weight:600; font-size:0.95rem; margin-bottom:4px; }
    .card__meta { font-size:0.82rem; color:var(--color-muted); margin-bottom:12px; }
    .card__price { font-size:1.1rem; font-weight:600; color:var(--color-sage-deep); }
    .badge {
      display:inline-block; padding:3px 10px; border-radius:20px;
      font-size:0.75rem; font-weight:500;
    }
    .badge--pending { background:#FEF9C3; color:#854D0E; }
    .badge--approved { background:#DCFCE7; color:#166534; }
    .badge--active { background:#DBEAFE; color:#1E40AF; }
    .badge--rejected { background:#FEE2E2; color:#991B1B; }
    .empty {
      text-align:center; padding:60px 20px;
      color:var(--color-muted); font-size:0.9rem;
    }
    .empty__icon { font-size:2.5rem; margin-bottom:12px; }
    .fav-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:20px; }
    .chat-list { display:flex; flex-direction:column; gap:12px; }
    .chat-item {
      display:flex; align-items:center; gap:14px; padding:16px 20px;
      background:rgba(255,255,255,0.6); backdrop-filter:blur(12px);
      border:1px solid var(--color-border); border-radius:14px; cursor:pointer;
      transition:border-color 0.15s;
    }
    .chat-item:hover { border-color:var(--color-sage-mid); }
    .chat-avatar {
      width:42px; height:42px; border-radius:50%;
      background:var(--color-sage-ghost); display:flex; align-items:center;
      justify-content:center; font-weight:600; color:var(--color-sage-deep); flex-shrink:0;
    }
    .chat-item__name { font-weight:600; font-size:0.9rem; }
    .chat-item__preview { font-size:0.82rem; color:var(--color-muted); }
    .chat-panel {
      display:none; position:fixed; right:0; top:0; bottom:0; width:380px;
      background:white; border-left:1px solid var(--color-border);
      flex-direction:column; z-index:200;
    }
    .chat-panel.open { display:flex; }
    .chat-panel__header {
      padding:20px 24px; border-bottom:1px solid var(--color-border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .chat-messages { flex:1; overflow-y:auto; padding:20px 24px; display:flex; flex-direction:column; gap:12px; }
    .msg { max-width:75%; padding:10px 14px; border-radius:14px; font-size:0.88rem; line-height:1.5; }
    .msg--out { background:var(--color-sage-deep); color:white; align-self:flex-end; border-bottom-right-radius:4px; }
    .msg--in { background:var(--color-sage-ghost); color:var(--color-foreground); align-self:flex-start; border-bottom-left-radius:4px; }
    .chat-input-row { padding:16px 24px; border-top:1px solid var(--color-border); display:flex; gap:10px; }
    .chat-input-row input {
      flex:1; border:1px solid var(--color-border); border-radius:10px;
      padding:10px 14px; font-size:0.88rem; font-family:inherit; outline:none;
    }
    .chat-input-row input:focus { border-color:var(--color-sage-mid); }
    .section-title { font-weight:600; font-size:1.1rem; margin-bottom:20px; }
    .sk-card { height:120px; border-radius:16px; }
    @media(max-width:768px) {
      .dash { flex-direction:column; }
      .dash__sidebar { width:100%; height:auto; position:relative; top:0; border-right:none; border-bottom:1px solid var(--color-border); padding:16px; display:flex; gap:8px; overflow-x:auto; }
      .dash__main { padding:24px 16px; }
      .stat-grid { grid-template-columns:repeat(2,1fr); }
      .nav-item { white-space:nowrap; }
    }
  </style>
</head>
<body>

<div class="mesh-bg" aria-hidden="true">
  <div class="mesh-orb mesh-orb--1"></div>
  <div class="mesh-orb mesh-orb--2"></div>
  <div class="mesh-orb mesh-orb--3"></div>
</div>

<nav class="nav glass-nav">
  <div class="nav__inner">
    <a href="index.html" class="nav__logo">
      <span class="nav__logo-mark">H</span><span class="nav__logo-text">omerr</span>
    </a>
    <div class="nav__actions" id="nav-actions"></div>
  </div>
</nav>

<div class="dash">
  <!-- Sidebar -->
  <aside class="dash__sidebar">
    <button class="nav-item active" data-tab="overview">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Overview
    </button>
    <button class="nav-item" data-tab="applications">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Applications
    </button>
    <button class="nav-item" data-tab="favourites">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      Saved
    </button>
    <button class="nav-item" data-tab="messages">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Messages
    </button>
    <div style="margin-top:auto;padding-top:24px;border-top:1px solid var(--color-border);margin-top:32px;">
      <button class="nav-item" id="logout-sidebar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign out
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="dash__main">
    <div id="greeting-name" class="dash__greeting">Welcome back</div>
    <p class="dash__sub" id="dash-sub">Here's what's happening with your rental search.</p>

    <!-- OVERVIEW -->
    <div class="section active" id="tab-overview">
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-card__value skeleton" id="stat-applications" style="width:40px;height:32px;border-radius:6px;"></div>
          <div class="stat-card__label">Applications sent</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__value skeleton" id="stat-favourites" style="width:40px;height:32px;border-radius:6px;"></div>
          <div class="stat-card__label">Saved properties</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__value skeleton" id="stat-messages" style="width:40px;height:32px;border-radius:6px;"></div>
          <div class="stat-card__label">Active conversations</div>
        </div>
      </div>

      <div class="section-title">Recent applications</div>
      <div id="overview-applications">
        <div class="card skeleton sk-card"></div>
        <div class="card skeleton sk-card"></div>
      </div>
    </div>

    <!-- APPLICATIONS -->
    <div class="section" id="tab-applications">
      <div class="section-title">Your applications</div>
      <div id="applications-list">
        <div class="card skeleton sk-card"></div>
        <div class="card skeleton sk-card"></div>
        <div class="card skeleton sk-card"></div>
      </div>
    </div>

    <!-- FAVOURITES -->
    <div class="section" id="tab-favourites">
      <div class="section-title">Saved properties</div>
      <div class="fav-grid" id="favourites-grid">
        <div class="property-card-skeleton"><div class="skeleton sk-image"></div><div class="sk-body"><div class="skeleton sk-title"></div><div class="skeleton sk-sub"></div><div class="skeleton sk-price"></div></div></div>
        <div class="property-card-skeleton"><div class="skeleton sk-image"></div><div class="sk-body"><div class="skeleton sk-title"></div><div class="skeleton sk-sub"></div><div class="skeleton sk-price"></div></div></div>
      </div>
    </div>

    <!-- MESSAGES -->
    <div class="section" id="tab-messages">
      <div class="section-title">Messages</div>
      <div class="chat-list" id="chat-list">
        <div class="card skeleton sk-card"></div>
        <div class="card skeleton sk-card"></div>
      </div>
    </div>
  </main>
</div>

<!-- Chat panel -->
<div class="chat-panel" id="chat-panel">
  <div class="chat-panel__header">
    <div>
      <div style="font-weight:600;" id="chat-panel-name">Chat</div>
      <div style="font-size:0.8rem;color:var(--color-muted);" id="chat-panel-property"></div>
    </div>
    <button onclick="document.getElementById('chat-panel').classList.remove('open')"
      style="background:none;border:none;cursor:pointer;color:var(--color-muted);">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-row">
    <input type="text" id="chat-input" placeholder="Type a message…" />
    <button class="btn btn--primary btn--sm" id="chat-send">Send</button>
  </div>
</div>

<script src="static/js/api.js"></script>
<script>
(() => {
  if (!requireAuth()) return;
  if (Auth.getRole() !== 'user') { window.location.href = 'landlord-dashboard.html'; return; }

  const user = Auth.getUser();
  document.getElementById('greeting-name').textContent = `Welcome back, ${user?.name?.split(' ')[0] || 'there'}`;

  // Nav actions
  const navActions = document.getElementById('nav-actions');
  navActions.innerHTML = `<button class="btn btn--primary" id="logout-btn">Sign out</button>`;
  document.getElementById('logout-btn').addEventListener('click', () => {
    Auth.clearSession(); window.location.href = 'index.html';
  });
  document.getElementById('logout-sidebar').addEventListener('click', () => {
    Auth.clearSession(); window.location.href = 'index.html';
  });

  // Tab switching
  document.querySelectorAll('.nav-item[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
    });
  });

  // Badge helper
  function badge(status) {
    const map = { pending:'badge--pending', approved:'badge--approved', active:'badge--active', rejected:'badge--rejected' };
    return `<span class="badge ${map[status] || 'badge--pending'}">${status}</span>`;
  }

  // Render application card
  function renderApp(a) {
    return `
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div>
            <div class="card__title">${a.name || 'Property'}</div>
            <div class="card__meta">${a.location || ''}</div>
            <div class="card__price">KES ${Number(a.price||0).toLocaleString()} / mo</div>
          </div>
          ${badge(a.status)}
        </div>
        ${a.message ? `<div style="margin-top:12px;font-size:0.83rem;color:var(--color-muted);font-style:italic;">"${a.message}"</div>` : ''}
        <div style="margin-top:12px;font-size:0.78rem;color:var(--color-muted);">
          Applied ${new Date(a.created_at).toLocaleDateString('en-KE',{day:'numeric',month:'short',year:'numeric'})}
        </div>
      </div>`;
  }

  // Load all data
  let convos = [];

  async function loadAll() {
    try {
      const [apps, favs, conversations] = await Promise.all([
        API.getApplications(),
        API.getFavourites(),
        API.getConversations().catch(() => []),
      ]);
      convos = conversations || [];

      // Stats
      const statApps = document.getElementById('stat-applications');
      const statFavs = document.getElementById('stat-favourites');
      const statMsgs = document.getElementById('stat-messages');
      statApps.className = 'stat-card__value';
      statApps.textContent = apps.length;
      statFavs.className = 'stat-card__value';
      statFavs.textContent = favs.length;
      statMsgs.className = 'stat-card__value';
      statMsgs.textContent = convos.length;

      // Overview applications (last 3)
      const overviewEl = document.getElementById('overview-applications');
      const recent = apps.slice(0, 3);
      overviewEl.innerHTML = recent.length
        ? recent.map(renderApp).join('')
        : `<div class="empty"><div class="empty__icon">📋</div>No applications yet. <a href="listings.html">Browse listings</a></div>`;

      // Applications tab
      document.getElementById('applications-list').innerHTML = apps.length
        ? apps.map(renderApp).join('')
        : `<div class="empty"><div class="empty__icon">📋</div>No applications yet. <a href="listings.html">Browse listings</a> to get started.</div>`;

      // Favourites tab
      document.getElementById('favourites-grid').innerHTML = favs.length
        ? favs.map(renderPropertyCard).join('')
        : `<div class="empty" style="grid-column:1/-1"><div class="empty__icon">❤️</div>No saved properties yet. <a href="listings.html">Browse listings</a></div>`;

      // Messages tab
      const chatList = document.getElementById('chat-list');
      chatList.innerHTML = convos.length
        ? convos.map(c => `
          <div class="chat-item" data-id="${c.id}" data-name="${c.landlord_name||'Landlord'}" data-property="${c.accommodation_name||'Property'}">
            <div class="chat-avatar">${(c.landlord_name||'L')[0]}</div>
            <div>
              <div class="chat-item__name">${c.landlord_name||'Landlord'}</div>
              <div class="chat-item__preview">${c.accommodation_name||'Property'}</div>
            </div>
            <svg style="margin-left:auto;color:var(--color-muted)" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          </div>`).join('')
        : `<div class="empty"><div class="empty__icon">💬</div>No conversations yet. Apply for a property to start chatting with landlords.</div>`;

      // Chat item click
      document.querySelectorAll('.chat-item').forEach(item => {
        item.addEventListener('click', () => openChat(
          item.dataset.id,
          item.dataset.name,
          item.dataset.property
        ));
      });

      initReveal();
    } catch(err) {
      console.error(err);
    }
  }

  // Chat panel
  let activeChatId = null;
  let chatPollInterval = null;

  async function openChat(id, name, property) {
    activeChatId = id;
    document.getElementById('chat-panel-name').textContent = name;
    document.getElementById('chat-panel-property').textContent = property;
    document.getElementById('chat-panel').classList.add('open');
    await loadMessages();
    clearInterval(chatPollInterval);
    chatPollInterval = setInterval(loadMessages, 5000);
  }

  async function loadMessages() {
    if (!activeChatId) return;
    try {
      const msgs = await API.getMessages(activeChatId);
      const userId = Auth.getUser()?.id;
      const container = document.getElementById('chat-messages');
      container.innerHTML = (msgs||[]).map(m => `
        <div class="msg ${m.sender_id === userId ? 'msg--out' : 'msg--in'}">${m.content}</div>
      `).join('');
      container.scrollTop = container.scrollHeight;
    } catch(e) {}
  }

  document.getElementById('chat-send').addEventListener('click', sendMessage);
  document.getElementById('chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMessage();
  });

  async function sendMessage() {
    const input = document.getElementById('chat-input');
    const content = input.value.trim();
    if (!content || !activeChatId) return;
    input.value = '';
    try {
      await API.sendMessage(activeChatId, content);
      await loadMessages();
    } catch(e) {}
  }

  loadAll();
})();
</script>
</body>
</html>
